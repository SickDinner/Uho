<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pill Kospi: Riisinjyvien Kosto</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: 'Fira Code', 'Courier New', monospace;
    }

    body {
      margin: 0;
      padding: 0;
      background: radial-gradient(circle at top, #1f2236 0%, #090b15 70%);
      color: #f2f6ff;
      min-height: 100vh;
      display: flex;
      align-items: stretch;
      justify-content: center;
    }

    #gameContainer {
      display: flex;
      width: 100vw;
      height: 100vh;
      max-width: 1200px;
    }

    #gameCanvas {
      flex: 1;
      background: #020307;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      border-right: 2px solid #2a2e45;
    }

    #ui {
      width: 340px;
      background: rgba(15, 18, 32, 0.94);
      padding: 12px;
      box-sizing: border-box;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .ui-panel {
      border: 1px solid #353b5c;
      padding: 10px;
      background: rgba(12, 14, 26, 0.8);
      box-shadow: inset 0 0 18px rgba(40, 45, 70, 0.35);
    }

    .ui-title {
      font-weight: bold;
      color: #ffc857;
      margin-bottom: 8px;
      letter-spacing: 1px;
      text-transform: uppercase;
      font-size: 13px;
    }

    #zoneTitle {
      font-size: 16px;
      font-weight: bold;
      color: #78f2ff;
      margin-bottom: 4px;
    }

    #zoneDescription {
      font-size: 12px;
      color: #c3c9ff;
      line-height: 1.4;
    }

    .stat-row {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      padding: 2px 0;
    }

    #inventoryList {
      list-style: none;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      gap: 6px;
      font-size: 12px;
    }

    .inventory-item {
      display: flex;
      gap: 6px;
      align-items: center;
      background: rgba(40, 45, 70, 0.3);
      padding: 4px 6px;
      border-radius: 4px;
    }

    .inventory-item.primary {
      border: 1px solid #78f2ff;
      box-shadow: 0 0 8px rgba(120, 242, 255, 0.4);
    }

    .inventory-item.grenades {
      justify-content: center;
      color: #ffd166;
      font-weight: bold;
    }

    .pill-icon {
      font-size: 14px;
    }

    .pill-name {
      flex: 1;
    }

    .pill-effect {
      color: #b2b7ff;
      font-style: italic;
    }

    .ui-note {
      margin-top: 6px;
      font-size: 11px;
      color: #9ca1d7;
    }

    #inventoryPanel.collapsed #inventoryList,
    #inventoryPanel.collapsed .ui-note {
      display: none;
    }

    #inventoryPanel.collapsed::after {
      content: 'Inventory tucked away (press I)';
      font-size: 11px;
      color: #9ca1d7;
    }

    #messageLog {
      height: 220px;
      overflow-y: auto;
      background: rgba(4, 6, 14, 0.9);
      border: 1px solid #2c314f;
      padding: 6px;
      font-size: 11px;
      line-height: 1.4;
    }

    .message {
      margin-bottom: 4px;
    }

    .status-line {
      font-size: 12px;
      margin-bottom: 4px;
    }

    @media (max-width: 1000px) {
      #ui {
        width: 300px;
      }
    }
  </style>
</head>
<body>
  <div id="gameContainer">
    <canvas id="gameCanvas" width="800" height="600"></canvas>
    <div id="ui">
      <div class="ui-panel">
        <div class="ui-title">Zone</div>
        <div id="zoneTitle"></div>
        <div id="zoneDescription"></div>
      </div>

      <div class="ui-panel">
        <div class="ui-title">Stats</div>
        <div id="statsPanel"></div>
      </div>

      <div id="inventoryPanel" class="ui-panel">
        <div class="ui-title">Inventory</div>
        <ul id="inventoryList"></ul>
        <div class="ui-note">Press Q to swallow the top pill. Pills reveal their secrets only once.</div>
      </div>

      <div class="ui-panel">
        <div class="ui-title">Status</div>
        <div id="statusPanel"></div>
      </div>

      <div class="ui-panel">
        <div class="ui-title">Log</div>
        <div id="messageLog"></div>
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
